name: 주식 자동 알림

# PC를 꺼도 GitHub 서버가 주기적으로 시세/신호를 점검해 텔레그램으로 알림을 보냅니다.
# 토큰은 저장소 Secrets(TELEGRAM_BOT_TOKEN / TELEGRAM_CHAT_ID)에서 읽으며 코드/로그에 노출되지 않습니다.

on:
  schedule:
    - cron: "*/30 * * * *"      # 30분마다 (UTC 기준 — 한국장·미국장 모두 커버)
  workflow_dispatch:            # 수동 실행 버튼 (테스트용)
    inputs:
      test:
        description: "텔레그램 테스트 메시지 발송"
        type: boolean
        default: false

permissions:
  contents: read

concurrency:
  group: stock-alerts
  cancel-in-progress: false     # 점검 도중 다음 스케줄이 끼어들어 중복/꼬임 방지

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-alerts.txt

      - name: 의존성 설치 (경량)
        run: pip install -r requirements-alerts.txt

      # 중복 발송 방지용 상태(alert_state.json)를 실행 간에 캐시로 유지.
      # 키는 매 실행 고유 → 직전 캐시를 restore-keys 접두사로 복원하고, 종료 시 새로 저장(롤링).
      - name: 직전 알림 상태 복원
        uses: actions/cache@v4
        with:
          path: data/alert_state.json
          key: alert-state-${{ github.run_id }}-${{ github.run_attempt }}
          restore-keys: |
            alert-state-

      - name: 테스트 메시지 (수동 실행 시)
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.test }}
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python alerts_run.py --test

      - name: 신호·목표가·손절가 점검 후 발송
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python alerts_run.py
